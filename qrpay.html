<!DOCTYPE html>
<html>

<head>
<title>QRPH Payment</title>

<style>

body{
font-family:Arial;
text-align:center;
padding-top:120px;
background:#f3efe8;
transition:background 0.3s,color 0.3s;
}

button{
padding:12px 20px;
font-size:16px;
background:#1f6ed4;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:background 0.2s;
}

button:hover{
background:#1858aa;
}

/* DARK MODE */

body.dark{
background:#0f172a;
color:#f1f5f9;
}

body.dark button{
background:#2563eb;
}

body.dark button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<h2>QRPH Payment</h2>
<p>Confirm your payment</p>

<button onclick="payNow()">Pay</button>

<script>

/* load theme from settings */
let theme = localStorage.getItem("theme");

if(theme === "dark"){
document.body.classList.add("dark");
}

function payNow(){
window.location.href = "home.html?payment=success";
}

</script>

</body>
</html>
