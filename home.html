<!DOCTYPE html>
<html>
<head>
<title>ActLocal Home</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>



<!-- Navbar -->
<div class="navbar">

    <div class="logo home-logo">
        <span class="act-logo">Act</span>
        <span class="local-logo">Local</span>
    </div>

    <div class="nav-actions">

        <span class="nav-item post-item">
            <span class="plus">+</span>
            <span class="post-text">Post</span>
        </span>

        <span class="nav-item">
            <i data-lucide="user"></i>
        </span>

        <span class="nav-item">
            <i data-lucide="log-out"></i>
        </span>

    </div>

</div>
</div>

<!-- Feed -->

<div class="feed" id="feed">
    <p class="empty-feed">No posts yet.</p>
</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
