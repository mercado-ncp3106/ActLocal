<!DOCTYPE html>
<html>

<head>
    <title>ActLocal Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="center">

    <div class="logo">
        <span class="act-logo">Act</span>
        <span class="local-logo">Local</span>
    </div>

    <p class="quote">"Turn concern into community action."</p>

    <div class="card">

        <h2>Welcome Back</h2>

        <form onsubmit="login(event)">

            <label for="email">Email</label>
            <input
                type="email"
                id="loginEmail"
                placeholder="your@email.com"
                required
            >

            <label for="password">Password</label>
            <input
                type="password"
                id="loginPassword"
                placeholder="Password"
                required
            >

            <button type="submit">Log In</button>

        </form>

        <p class="signup-text">Don't have an account?</p>
        <a href="signup.html" class="signup-link">Sign Up</a>

    </div>

    <p class="footer-text">
        ActLocal empowers communities to identify, report, and address local environmental and infrastructure issues.
    </p>

    <script src="script.js"></script>

</body>

</html>
