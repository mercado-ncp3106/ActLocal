<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActLocal Login</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="center">

    <div class="logo">
        <span class="act-logo">Act</span>
        <span class="local-logo">Local</span>
    </div>

    <p class="quote">"Turn concern into community action."</p>

    <div class="card">

        <h2>Welcome Back</h2>

        <form onsubmit="login(event)">

            <label for="email">Email</label>
            <input
                type="email"
                id="loginEmail"
                placeholder="your@email.com"
                required
            >

            <label for="password">Password</label>
            <input
                type="password"
                id="loginPassword"
                placeholder="Password"
                required
            >

            <button type="submit">Log In</button>

        </form>

        <p class="signup-text">Don't have an account?</p>
        <a href="signup.html" class="signup-link">Sign Up</a>

    </div>

    <div id="loginOtpModal" class="modern-modal">

    <div class="modern-modal-box">

        <h2>Verify OTP</h2>
        <p id="loginOtpPhone"></p>

        <div class="otp-container">
    <input type="text" maxlength="1" class="signup-otp-input login-otp-input">
    <input type="text" maxlength="1" class="signup-otp-input login-otp-input">
    <input type="text" maxlength="1" class="signup-otp-input login-otp-input">
    <input type="text" maxlength="1" class="signup-otp-input login-otp-input">
    <input type="text" maxlength="1" class="signup-otp-input login-otp-input">
    <input type="text" maxlength="1" class="signup-otp-input login-otp-input">
</div>

        <p id="loginOtpTimer" class="otp-timer"></p>

<button onclick="resendLoginOTP()" class="btn-light" id="resendLoginBtn" style="display:none;">
    Resend OTP
</button>

        <div class="modern-actions">
            <button onclick="verifyLoginOTP()" class="btn-primary">Verify</button>
            <button onclick="closeLoginOTP()" class="btn-light">Cancel</button>
        </div>

    </div>

</div>

    <p class="footer-text">
        ActLocal empowers communities to identify, report, and address local environmental and infrastructure issues.
    </p>

    <script src="./script.js"></script>

</body>

</html>
